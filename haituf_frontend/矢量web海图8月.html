function drawAllPolygonLines(url,level) {
  return fetch(url)
    .then(response => response.json())
    .then(geojson => {
      // 你的处理代码（保持不变）
      const lineFeatures = [];
      const fillFeatures = [];

      // 解析 zoom 范围
      const zoomRanges = {
        1: { minzoom: 0, maxzoom: 4 },
        2: { minzoom: 4, maxzoom: 7 },
        3: { minzoom: 7, maxzoom: 10 },
        4: { minzoom: 10, maxzoom: 12 },
        5: { minzoom: 12, maxzoom: 14 },
        6: { minzoom: 14, maxzoom: 24 }
      };
        const { minzoom, maxzoom } = zoomRanges[Number(level)] || { minzoom: 0, maxzoom: 24 };
      geojson.features.forEach((feature, index) => {
        const geom = feature.geometry;
        if (!geom) return;

        const drval1 = feature.properties?.DRVAL1 ?? 0;

        fillFeatures.push({
          type: 'Feature',
          geometry: geom,
          properties: {
            id: 'fill-' + index,
            DRVAL1: drval1
          }
        });

        if (geom.type === 'Polygon') {
          const outer = geom.coordinates[0];
          lineFeatures.push({
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: outer
            },
            properties: {
              id: 'poly-' + index,
              DRVAL1: drval1
            }
          });
        }

        if (geom.type === 'MultiPolygon') {
          geom.coordinates.forEach((polygon, polyIdx) => {
            const outer = polygon[0];
            lineFeatures.push({
              type: 'Feature',
              geometry: {
                type: 'LineString',
                coordinates: outer
              },
              properties: {
                id: 'multipoly-' + index + '-' + polyIdx,
                DRVAL1: drval1
              }
            });
          });
        }
      });

      // 使用URL作为图层ID
      const fillLayerId = 'all-fills-' + encodeURIComponent(url);
      const fillSourceId = 'all-fills-source-' + encodeURIComponent(url);

      // 添加或更新填充图层
      const fillCollection = {
        type: 'FeatureCollection',
        features: fillFeatures
      };


 
       if (map.getSource(fillSourceId)) {
        map.removeLayer(fillLayerId);
        map.removeSource(fillSourceId);
      }

      map.addSource(fillSourceId, {
        type: 'geojson',
        data: fillCollection
      });
      map.addLayer({
        id: fillLayerId  ,
        type: 'fill',
        source: fillSourceId   ,
        minzoom: minzoom,
        maxzoom: maxzoom,
        paint: {
          'fill-color': [
            'case',
            ['<=', ['get', 'DRVAL1'], -10], '#F0E68C',
            ['<=', ['get', 'DRVAL1'], -5], '#8FBF93',
            ['<=', ['get', 'DRVAL1'], 0], '#81C3E2',
            ['<=', ['get', 'DRVAL1'], 2], '#81C3E2',
            ['<=', ['get', 'DRVAL1'], 10], '#A7E0E9',
            ['<=', ['get', 'DRVAL1'], 20], '#B6EBDB',
            '#D8F4E1'
          ],
          'fill-opacity': 1
        }
      });


      // 使用URL作为图层ID
      const lineLayerId = 'all-lines-' + encodeURIComponent(url);
      const lineSourceId = 'all-lines-source-' + encodeURIComponent(url);


      // 添加或更新边界线图层
      const lineCollection = {
        type: 'FeatureCollection',
        features: lineFeatures
      };


      // if (map.getSource('s57_lines')) {

      //     data: lineCollection
      //   });
      // }
     if (map.getSource(lineSourceId)) {
        map.removeLayer(lineLayerId);
        map.removeSource(lineSourceId);
      }

      map.addSource(lineSourceId, {
        type: 'geojson',

      // map.addLayer({

        const { minzoom, maxzoom } = zoomRanges[Number(level)] || { minzoom: 0, maxzoom: 24 };


  map.addSource(sourceId, {
    type: 'geojson',
    data: `${filename}`  // 假设文件是标准 GeoJSON 格式
  });

  map.addLayer({
    id: fillLayerId,
    type: 'fill',
    source: sourceId,
    minzoom: minzoom,
    maxzoom: maxzoom,
    paint: {
      'fill-color': '#CCC57B',
      'fill-opacity': 1
    }
  });

  map.addLayer({
    id: outlineLayerId,

  });
}

function drawLandLines(url,level) {
  return fetch(url)
    .then(response => response.json())
    .then(geojson => {
      // 你的处理代码（保持不变）
      const lineFeatures = [];
      const fillFeatures = [];

      // 解析 zoom 范围
      const zoomRanges = {
        1: { minzoom: 0, maxzoom: 4 },
        2: { minzoom: 4, maxzoom: 7 },
        3: { minzoom: 7, maxzoom: 10 },
        4: { minzoom: 10, maxzoom: 12 },
        5: { minzoom: 12, maxzoom: 14 },
        6: { minzoom: 14, maxzoom: 24 }
      };
        const { minzoom, maxzoom } = zoomRanges[Number(level)] || { minzoom: 0, maxzoom: 24 };
      geojson.features.forEach((feature, index) => {
        const geom = feature.geometry;
        if (!geom) return;

        const drval1 = feature.properties?.DRVAL1 ?? 0;

        fillFeatures.push({
          type: 'Feature',
          geometry: geom,
          properties: {
            id: 'fill-' + index,
            DRVAL1: drval1
          }
        });

        if (geom.type === 'Polygon') {
          const outer = geom.coordinates[0];
          lineFeatures.push({
            type: 'Feature',
            geometry: {
              type: 'LineString',
              coordinates: outer
            },
            properties: {
              id: 'poly-' + index,
              DRVAL1: drval1
            }
          });
        }

        if (geom.type === 'MultiPolygon') {
          geom.coordinates.forEach((polygon, polyIdx) => {
            const outer = polygon[0];
            lineFeatures.push({
              type: 'Feature',
              geometry: {
                type: 'LineString',
                coordinates: outer
              },
              properties: {
                id: 'multipoly-' + index + '-' + polyIdx,
                DRVAL1: drval1
              }
            });
          });
        }
      });

      // 使用URL作为图层ID
      const fillLayerId = 'all-fills-' + encodeURIComponent(url);
      const fillSourceId = 'all-fills-source-' + encodeURIComponent(url);

      // 添加或更新填充图层
      const fillCollection = {
        type: 'FeatureCollection',
        features: fillFeatures
      };


 
       if (map.getSource(fillSourceId)) {
        map.removeLayer(fillLayerId);
        map.removeSource(fillSourceId);
      }

      map.addSource(fillSourceId, {
        type: 'geojson',
        data: fillCollection
      });
      map.addLayer({
        id: fillLayerId  ,
        type: 'fill',
        source: fillSourceId   ,
        minzoom: minzoom,
        maxzoom: maxzoom,
        paint: {
          'fill-color': [
            'case',
            ['<=', ['get', 'DRVAL1'], -10], '#F0E68C',
            ['<=', ['get', 'DRVAL1'], -5], '#8FBF93',
            ['<=', ['get', 'DRVAL1'], 0], '#81C3E2',
            ['<=', ['get', 'DRVAL1'], 2], '#81C3E2',
            ['<=', ['get', 'DRVAL1'], 10], '#A7E0E9',
            ['<=', ['get', 'DRVAL1'], 20], '#B6EBDB',
            '#D8F4E1'
          ],
          'fill-opacity': 1
        }
      });


      // 使用URL作为图层ID
      const lineLayerId = 'all-lines-' + encodeURIComponent(url);
      const lineSourceId = 'all-lines-source-' + encodeURIComponent(url);


      // 添加或更新边界线图层
      const lineCollection = {
        type: 'FeatureCollection',
        features: lineFeatures
      };



     if (map.getSource(lineSourceId)) {
        map.removeLayer(lineLayerId);
        map.removeSource(lineSourceId);
      }

      map.addSource(lineSourceId, {
        type: 'geojson',
        data: lineCollection
      });


      map.addLayer({
        id: lineLayerId,
        type: 'line',
        source: lineSourceId,
        minzoom: minzoom,
        maxzoom: maxzoom,
        layout: {
          'line-join': 'round',
          'line-cap': 'round'
        },
        paint: {
          'line-color': '#000',
          'line-width': 1.5
        }
      });

      // 返回Promise完成，告诉调用者图层加载完成
      return Promise.resolve();
    })
    .catch(error => {
      console.error('加载GeoJSON失败:', error);
      return Promise.reject(error);
    });
}

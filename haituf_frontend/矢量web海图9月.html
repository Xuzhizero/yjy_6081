function reorderLayersByType(map) {
  const layers = map.getStyle().layers;

  if (!layers || layers.length === 0) return;

  const fillLayers = [];
  const lineLayers = [];
  const symbolLayers = [];

  // 分类
  for (const layer of layers) {
    if (layer.type === 'fill') {
      fillLayers.push(layer.id);
    } else if (layer.type === 'line') {
      lineLayers.push(layer.id);
    } else if (layer.type === 'symbol') {
      symbolLayers.push(layer.id);
    }
  }

  // 合并为新顺序（fill最底，symbol最顶）
  const desiredOrder = [...fillLayers, ...lineLayers, ...symbolLayers];
console.log('重新排序的图层顺序:', desiredOrder);
  // 重排顺序
  for (const layerId of desiredOrder) {
    map.moveLayer(layerId);
  }
}

async function loadIslands( txtUrl) {

        // 解析 zoom 范围
      const zoomRanges = {
        1: { minzoom: 0, maxzoom: 4 },
        2: { minzoom: 4, maxzoom: 7 },
        3: { minzoom: 7, maxzoom: 10 },
        4: { minzoom: 10, maxzoom: 12 },
        5: { minzoom: 12, maxzoom: 14 },
        6: { minzoom: 14, maxzoom: 24 }
      };


      const response = await fetch(txtUrl);
      const text = await response.text();

      // 分 level 存储
      const levelFeatures = {};


      text.split("\n").forEach(line => {
          line = line.trim();
          if (!line) return;
          const parts = line.split(/\s+/);
          if (parts.length < 4) return;

          const lng = parseFloat(parts[0]);
          const lat = parseFloat(parts[1]);
          const name = parts[2];
          const level = parseInt(parts[3]);

          if (!levelFeatures[level]) levelFeatures[level] = [];

          levelFeatures[level].push({
            type: "Feature",
            geometry: { type: "Point", coordinates: [lng, lat] },
            properties: { name, level }
          });


        });


          // 为每个 level 建 source + layer
        Object.keys(levelFeatures).forEach(levelKey => {
          const level = Number(levelKey);
          const { minzoom, maxzoom } = zoomRanges[level - 10] || { minzoom: 0, maxzoom: 24 };

          const geojson = { type: "FeatureCollection", features: levelFeatures[level] };

          const sourceId = `islands-name-${level}`;
          const layerId = `island-name-labels-${level}`;

          if (!map.getSource(sourceId)) {
            map.addSource(sourceId, { type: "geojson", data: geojson });
          }

      
          if (!map.getLayer(layerId)) {
              map.addLayer({
                id: layerId,
                type: "symbol",
                source: sourceId,
                layout: {
                  "text-field": ["get", "name"],
                  "text-anchor": "top",
                  
                },
                paint: {
                  "text-color": "#000",
                  "text-halo-color": "#fff",
                  "text-halo-width": 1
                },
                minzoom,
                maxzoom,
              });
            }
      });
  }

async function addIcon(lng, lat, imgUrl) {
    // 先加载图片
    const img = new Image();
    img.src = imgUrl;
    await new Promise(resolve => {
        img.onload = resolve;
    });

    const iconId = "single-island-icon";

    if (!map.hasImage(iconId)) {
        map.addImage(iconId, img);
    }

    // 创建 GeoJSON
    const geojson = {
        type: "FeatureCollection",
        features: [{
            type: "Feature",
            geometry: { type: "Point", coordinates: [lng, lat] },
            properties: {}
        }]
    };

    const sourceId = "single-island-source";
    const layerId = "single-island-layer";

    if (!map.getSource(sourceId)) {
        map.addSource(sourceId, { type: "geojson", data: geojson });
    } else {
        // 已有 source 则更新数据
        map.getSource(sourceId).setData(geojson);
    }

    if (!map.getLayer(layerId)) {
        map.addLayer({
            id: layerId,
            type: "symbol",
            source: sourceId,
            layout: {
                "icon-image": iconId,
                "icon-size": 0.5,           // 根据需要调整大小
                "icon-allow-overlap": true
            }
        });
    }
}

/**
 * 从文件读取浮标数据并批量绘制图标 + RCID
 * @param {object} map - Mapbox GL JS 地图实例
 * @param {string} fileUrl - 数据文件路径 (CSV 或 TXT)
 * @param {string} imgUrl - PNG 图标路径
 * @param {string} iconId - 图标 ID（可自定义）
 */
async function drawBuoysFromFile(map, fileUrl, iconMap) {



    // // 加载图标
    // const img = new Image();
    // img.src = imgUrl;
    // await new Promise(resolve => img.onload = resolve);

    // if (!map.hasImage(iconId)) {
    //     map.addImage(iconId, img);
    // }

    // 读取文件
    const response = await fetch(fileUrl);
    const text = await response.text();

    // 按行拆分并跳过表头
    const lines = text.split("\n").map(l => l.trim()).filter(l => l).slice(1);

    const features = lines.map(line => {
        // Tab 分隔
        const parts = line.split("\t");
        if (parts.length < 6) return null;
        const rcid = parts[0];
        const lon = parseFloat(parts[4]); // 第5列
        const lat = parseFloat(parts[5]); // 第6列
        if (isNaN(lon) || isNaN(lat)) return null;

        const typeKey = parts[1] + "_" + parts[1]+ "_" +  String(parseInt(parts[3], 10))   ; // 第3、4列决定图标类型
        console.log('浮标类型:', typeKey, 'rcid:', rcid);
        
        return {
            type: "Feature",
            geometry: { type: "Point", coordinates: [lon, lat] },
            properties: { RCID: rcid , iconType: typeKey}
        };
    }).filter(f => f !== null);

    const geojson = { type: "FeatureCollection", features };
    const sourceId = "buoys-source";
    const iconLayerId = "buoys-icon-layer";
    const rcidLayerId = "buoys-rcid-layer";

    // 添加或更新 source
    if (!map.getSource(sourceId)) {
        map.addSource(sourceId, { type: "geojson", data: geojson });
    } else {
        map.getSource(sourceId).setData(geojson);
    }

    // 图标 layer
    if (!map.getLayer(iconLayerId)) {
        map.addLayer({
            id: iconLayerId,
            type: "symbol",
            source: sourceId,
            layout: {
                "icon-image": ["get", "iconType"],
                "icon-size": 1,
                "icon-allow-overlap": true
            }
        });
    }

    // RCID layer
    if (!map.getLayer(rcidLayerId)) {
        map.addLayer({
            id: rcidLayerId,
            type: "symbol",
            source: sourceId,
            layout: {
                "text-field": ["get", "RCID"],
                "text-size": 12,
                "text-offset": [0, 1.2],
                "text-anchor": "top"

function reorderLayersByType(map) {
  const layers = map.getStyle().layers;

  if (!layers || layers.length === 0) return;

  const fillLayers = [];
  const lineLayers = [];
  const symbolLayers = [];

  // 分类
  for (const layer of layers) {
    if (layer.type === 'fill') {
      fillLayers.push(layer.id);
    } else if (layer.type === 'line') {
      lineLayers.push(layer.id);
    } else if (layer.type === 'symbol') {
      symbolLayers.push(layer.id);
    }
  }

  // 合并为新顺序（fill最底，symbol最顶）
  const desiredOrder = [...fillLayers, ...lineLayers, ...symbolLayers];
console.log('重新排序的图层顺序:', desiredOrder);
  // 重排顺序
  for (const layerId of desiredOrder) {
    map.moveLayer(layerId);
  }
}

async function cacheStyleJson() {
    // 打开数据库
    const db = await openDB('fileCacheDB', 1, {
        upgrade(db) {
            db.createObjectStore('files');
        },
    });

    // 先检查是否已经缓存
    const cached = await db.get('files', 'style1.json');
    if (cached) {
        console.log('从 IndexedDB 加载 style1.json');
        useStyleJson(cached);
        return;
    }

    // Fetch 文件
    console.log('下载 style.json...');
    const response = await fetch('/style1.json');
    const blob = await response.blob();

    // 保存到 IndexedDB
    await db.put('files', blob, 'style1.json');
    console.log('style1.json 已缓存到 IndexedDB');

    useStyleJson(blob);
}

function useStyleJson(blob) {
    // 将 Blob 转换为 JSON
    const reader = new FileReader();
    reader.onload = () => {
       const styleData = JSON.parse(reader.result);
        //window.globalStyleData = styleData;
        console.log('style1.json 数据:', styleData);

        // 这里可以用 jsonData 初始化地图样式或其他用途


                // 初始化地图

            container: 'map',
            style: styleData,
            center: [122.058780, 30.003185],
            maxZoom: 13,
            minZoom: 2,
            zoom: 10,
            scrollZoom: {
              zoomDelta: 1,   // 一次滚轮缩放 1 级
              wheelZoomRate: 1/450 // 默认灵敏度，保持不变
            }
        });

        // 禁用默认滚轮缩放
        map.scrollZoom.disable();

        // 监听滚轮
        map.getCanvas().addEventListener('wheel', (e) => {
          e.preventDefault(); // 阻止默认行为

          const currentZoom = Math.round(map.getZoom()); // 取当前整数 zoom
          if (e.deltaY < 0) {
            map.easeTo({ zoom: currentZoom + 1 }); // 向上滚 → 放大 1

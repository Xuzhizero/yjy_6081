function reorderLayersByType(map) {
  const layers = map.getStyle().layers;

  if (!layers || layers.length === 0) return;

  const fillLayers = [];
  const lineLayers = [];
  const symbolLayers = [];

  // 分类
  for (const layer of layers) {
    if (layer.type === 'fill') {
      fillLayers.push(layer.id);
    } else if (layer.type === 'line') {
      lineLayers.push(layer.id);
    } else if (layer.type === 'symbol') {
      symbolLayers.push(layer.id);
    }
  }

  // 合并为新顺序（fill最底，symbol最顶）
  const desiredOrder = [...fillLayers, ...lineLayers, ...symbolLayers];
console.log('重新排序的图层顺序:', desiredOrder);
  // 重排顺序
  for (const layerId of desiredOrder) {
    map.moveLayer(layerId);
  }
}

    });

      map.addLayer({

        type: 'line',

        'source-layer': "chart_boundaries", 
        paint: {
          'line-color': '#00FF00',
          'line-width': 1
        }
      });

    // 用 filter 限制 minzoom/maxzoom
      map.setFilter("BOUND-line", [
        "all",
        [">=", ["zoom"], ["get", "minzoom"]],
        ["<=", ["zoom"], ["get", "maxzoom"]]
      ]);


      // 鼠标悬停显示 filename
      map.on("mousemove", "BOUND-line", (e) => {
        // 光标变成小手
        map.getCanvas().style.cursor = "pointer";

        if (e.features.length > 0) {
          const feature = e.features[0];
          const filename = feature.properties.filename;

          // 创建 Popup
          new maplibregl.Popup({
            closeButton: false,
            closeOnClick: false
          })
            .setLngLat(e.lngLat)
            .setHTML(`<b>${filename}</b>`)
            .addTo(map);
        }
      });

    // 鼠标移出恢复
    map.on("mouseleave", "BOUND-line", () => {
      map.getCanvas().style.cursor = "";
      // 移除所有 popup
      const popups = document.getElementsByClassName("maplibregl-popup");
      while (popups.length > 0) {
        popups[0].remove();
      }
    });



}


async function loadLandFiles() {
  try {

    for (const file of landfiles) {
      const filePath = `./Land_area/${file}`;
      console.log('加载文件:', filePath);

      // 提取文件名中的第二个数字，例如"C1616811.000.geojson"
      // 去除扩展名，提取数字部分
      // 这里假设数字部分是紧跟在第一个字母C后面的字符串
      const baseName = file.split('.')[0];  // "C1616811"
      // 提取第二个数字（字符串的第2个字符，索引1）
      // 也可以用正则匹配所有数字，取第二个数字
      // 这里先简单取字符串中第2个字符
      let secondDigit = null;

      // 方法1：直接取字符串第2个字符
      // secondDigit = baseName.charAt(1);

      // 方法2：用正则提取所有数字，再取第二个
      const digits = baseName.match(/\d/g);  // ["1","6","1","6","8","1","1"]
      if (digits && digits.length >= 2) {
        secondDigit = digits[1];  // 这里是 "6"
      }

      if (secondDigit === null) {
        console.warn(`文件名 ${file} 中未找到第二个数字，跳过`);
        continue;
      }

      await  addLandLayer(map, filePath ,secondDigit)
 
    }
  } catch (error) {
    console.error('加载文件时出错:', error);
  }
}


async function loadIslands( txtUrl) {

        // 解析 zoom 范围
      const zoomRanges = {
        1: { minzoom: 0, maxzoom: 4 },
        2: { minzoom: 4, maxzoom: 7 },
        3: { minzoom: 7, maxzoom: 10 },
        4: { minzoom: 10, maxzoom: 12 },
        5: { minzoom: 12, maxzoom: 14 },
        6: { minzoom: 14, maxzoom: 24 }
      };


      const response = await fetch(txtUrl);
      const text = await response.text();

      // 分 level 存储
      const levelFeatures = {};


      text.split("\n").forEach(line => {
          line = line.trim();
          if (!line) return;
          const parts = line.split(/\s+/);
          if (parts.length < 4) return;

          const lng = parseFloat(parts[0]);
          const lat = parseFloat(parts[1]);
          const name = parts[2];
          const level = parseInt(parts[3]);

          if (!levelFeatures[level]) levelFeatures[level] = [];

          levelFeatures[level].push({
            type: "Feature",
            geometry: { type: "Point", coordinates: [lng, lat] },
            properties: { name, level }
          });


        });


          // 为每个 level 建 source + layer
        Object.keys(levelFeatures).forEach(levelKey => {
          const level = Number(levelKey);
          const { minzoom, maxzoom } = zoomRanges[level - 10] || { minzoom: 0, maxzoom: 24 };

          const geojson = { type: "FeatureCollection", features: levelFeatures[level] };

          const sourceId = `islands-name-${level}`;
          const layerId = `island-name-labels-${level}`;

          if (!map.getSource(sourceId)) {
            map.addSource(sourceId, { type: "geojson", data: geojson });
          }

      
          if (!map.getLayer(layerId)) {
              map.addLayer({
                id: layerId,
                type: "symbol",
                source: sourceId,
                layout: {
                  "text-field": ["get", "name"],
                  "text-anchor": "top",
                  
                },
                paint: {
                  "text-color": "#000",
                  "text-halo-color": "#fff",
                  "text-halo-width": 1
                },
                minzoom,
                maxzoom,
              });
            }
      });
  }

async function addIcon(lng, lat, imgUrl) {
    // 先加载图片
    const img = new Image();
    img.src = imgUrl;
    await new Promise(resolve => {
        img.onload = resolve;
    });

    const iconId = "single-island-icon";

    if (!map.hasImage(iconId)) {
        map.addImage(iconId, img);
    }

    // 创建 GeoJSON
    const geojson = {
        type: "FeatureCollection",
        features: [{
            type: "Feature",
            geometry: { type: "Point", coordinates: [lng, lat] },
            properties: {}
        }]
    };

    const sourceId = "single-island-source";
    const layerId = "single-island-layer";

    if (!map.getSource(sourceId)) {
        map.addSource(sourceId, { type: "geojson", data: geojson });
    } else {
        // 已有 source 则更新数据
        map.getSource(sourceId).setData(geojson);
    }

    if (!map.getLayer(layerId)) {
        map.addLayer({
            id: layerId,
            type: "symbol",
            source: sourceId,
            layout: {
                "icon-image": iconId,
                "icon-size": 0.5,           // 根据需要调整大小
                "icon-allow-overlap": true
            }
        });
    }

 * 从文件读取浮标数据并批量绘制图标 + RCID
 * @param {object} map - Mapbox GL JS 地图实例
 * @param {string} fileUrl - 数据文件路径 (CSV 或 TXT)
 * @param {string} imgUrl - PNG 图标路径
 * @param {string} iconId - 图标 ID（可自定义）
 */
async function drawBuoysFromFile(map, fileUrl, iconMap) {



    // // 加载图标
    // const img = new Image();
    // img.src = imgUrl;
    // await new Promise(resolve => img.onload = resolve);

    // if (!map.hasImage(iconId)) {
    //     map.addImage(iconId, img);
    // }

    // 读取文件
    const response = await fetch(fileUrl);
    const text = await response.text();

    // 按行拆分并跳过表头
    const lines = text.split("\n").map(l => l.trim()).filter(l => l).slice(1);

    const features = lines.map(line => {
        // Tab 分隔
        const parts = line.split("\t");
        console.log('浮标数据行:', parts.length);
        if (parts.length < 4) return null;
        const rcid = parts[0];
        const lon = parseFloat(parts[1]); // 第5列
        const lat = parseFloat(parts[2]); // 第6列
        const typeKey  =  parts[3]
        if (isNaN(lon) || isNaN(lat)) return null;

        console.log('浮标类型:', typeKey, 'rcid:', rcid);
        
        return {
            type: "Feature",
            geometry: { type: "Point", coordinates: [lon, lat] },
            properties: { RCID: rcid , iconType: typeKey}
        };
    }).filter(f => f !== null);

    const geojson = { type: "FeatureCollection", features };
    const sourceId = "buoys-source";
    const iconLayerId = "buoys-icon-layer";
    const rcidLayerId = "buoys-rcid-layer";

    // 添加或更新 source
    if (!map.getSource(sourceId)) {
        map.addSource(sourceId, { type: "geojson", data: geojson });
    } else {
        map.getSource(sourceId).setData(geojson);
    }

    // 图标 layer
    if (!map.getLayer(iconLayerId)) {
        map.addLayer({
            id: iconLayerId,
            type: "symbol",
            source: sourceId,
            layout: {
                "icon-image": ["get", "iconType"],
                "icon-size": 1,
                "icon-allow-overlap": true
            }
        });
    }

    // RCID layer
    if (!map.getLayer(rcidLayerId)) {
        map.addLayer({
            id: rcidLayerId,
            type: "symbol",
            source: sourceId,
            layout: {
                "text-field": ["get", "RCID"],
                "text-size": 12,
                "text-offset": [0, 1.2],
                "text-anchor": "top"
            },
            paint: {
                "text-color": "#000",
                "text-halo-color": "#fff",
                "text-halo-width": 1
            }
        });
    }
}


function reorderLayersByType(map) {
  const layers = map.getStyle().layers;

  if (!layers || layers.length === 0) return;

  const fillLayers = [];
  const lineLayers = [];
  const symbolLayers = [];

  // 分类
  for (const layer of layers) {
    if (layer.type === 'fill') {
      fillLayers.push(layer.id);
    } else if (layer.type === 'line') {
      lineLayers.push(layer.id);
    } else if (layer.type === 'symbol') {
      symbolLayers.push(layer.id);
    }
  }

  // 合并为新顺序（fill最底，symbol最顶）
  const desiredOrder = [...fillLayers, ...lineLayers, ...symbolLayers];
console.log('重新排序的图层顺序:', desiredOrder);
  // 重排顺序
  for (const layerId of desiredOrder) {
    map.moveLayer(layerId);
  }
}
